<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Welcome to EkSathi!</title>
	<style type="text/css">
		body {
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
			font-size: 16px;
			line-height: 1.5;
			color: #333333;
			background-color: #f5f5f5;
		}

		h1 {
			font-size: 24px;
			font-weight: bold;
			margin: 20px 0;
			text-align: center;
		}

		p {
			margin: 10px 0;
			text-align: justify;
		}

		.container {
			max-width: 600px;
			margin: 0 auto;
			padding: 20px;
			background-color: #ffffff;
		}

		.signature {
			margin-top: 20px;
			text-align: center;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Teacher invitation by institute</h1>
		<p>Dear {{name}},</p>
		<p>Please click on the following link: <a href="{{sendUrl}}">{{sendUrl}}</a></p>
		<div class="signature">
			<p>Best regards,</p>
			<p>EkSathi Team</p>
		</div>
	</div>
</body>
</html>
